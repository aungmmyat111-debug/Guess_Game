<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Form</title>

<style>
    *{
        box-sizing:border-box;
        font-family:Arial, Helvetica, sans-serif;
    }

    body{
        background:#f2f2f2;
        margin:0;
        padding:40px;
    }

    .container{
        width:600px;
        margin:auto;
        background:white;
        padding:30px;
        border-radius:10px;
        box-shadow:0 0 10px rgba(0,0,0,.15);
    }

    h2{
        text-align:center;
        margin-bottom:25px;
    }

    .form-group{
        margin-bottom:18px;
    }

    label{
        display:block;
        font-weight:bold;
        margin-bottom:6px;
    }

    input[type=text],
    input[type=number],
    input[type=email],
    textarea,
    select{
        width:100%;
        padding:10px;
        border:1px solid #ccc;
        border-radius:5px;
        font-size:15px;
    }

    textarea{
        resize:vertical;
        height:100px;
    }

    .inline{
        display:flex;
        gap:20px;
        flex-wrap:wrap;
    }

    .inline label{
        font-weight:normal;
        margin-bottom:0;
    }

    button{
        width:100%;
        padding:12px;
        background:#007bff;
        color:white;
        border:none;
        border-radius:5px;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background:#0056b3;
    }
</style>
</head>

<body>

<div class="container">
    <h2>Product Form</h2>

    <form
        action="https://teach-backend-fawn.vercel.app/api/product"
        method="POST"
        enctype="multipart/form-data">

        <div class="form-group">
            <label>Item Name</label>
            <input
                type="text"
                name="itemName"
                value="Wireless Mouse"
                required>
        </div>

        <div class="form-group">
            <label>Item Description</label>
            <textarea
                name="itemDescription"
                required>Ergonomic wireless mouse with USB receiver.</textarea>
        </div>

        <div class="form-group">
            <label>Category</label>
            <select name="category">
                <option value="notSpecified">Not Specified</option>
                <option value="consumption">Consumption</option>
                <option value="household">Household</option>
                <option value="electronic" selected>Electronic</option>
                <option value="gadget">Gadget</option>
            </select>
        </div>

        <div class="form-group">
            <label>Inventory Amount</label>
            <input
                type="number"
                name="inventoryAmount"
                value="50"
                min="0">
        </div>

        <div class="form-group">
            <label>List Price</label>
            <input
                type="number"
                name="listPrice"
                value="799"
                min="0"
                step="0.01">
        </div>

        <div class="form-group">
            <label>Available Store</label>
            <div class="inline">
                <label>
                    <input type="checkbox" name="availableStore[]" value="Bangkok" checked>
                    Bangkok
                </label>

                <label>
                    <input type="checkbox" name="availableStore[]" value="Pattaya">
                    Pattaya
                </label>

                <label>
                    <input type="checkbox" name="availableStore[]" value="Phuket" checked>
                    Phuket
                </label>
            </div>
        </div>

        <div class="form-group">
            <label>Status</label>
            <div class="inline">
                <label>
                    <input
                        type="radio"
                        name="status"
                        value="Active"
                        checked>
                    Active
                </label>

                <label>
                    <input
                        type="radio"
                        name="status"
                        value="Inactive">
                    Inactive
                </label>
            </div>
        </div>

        <div class="form-group">
            <label>Staff Email</label>
            <input
                type="email"
                name="staffEmail"
                value="your.student@email.com"
                required>
        </div>

        <button type="submit">Submit</button>

    </form>
</div>

</body>
</html>
